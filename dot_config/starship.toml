# Main Prompt Layout
format = """
$directory\
$git_branch\
$aws\
$kubernetes\
$character
"""

# Tell Starship to use the custom 'zen' palette
palette = "zen"

# Custom Color Palette Definitions
[palettes.zen]
zen_cyan = "#89ddff"
zen_purple = "#c792ea"
zen_yellow = "#ffcb6b"
zen_blue = "#82b1ff"

# Prompt Modules Styling
[directory]
style = "bold zen_cyan"
truncation_length = 3
fish_style_pwd_dir_length = 1

[git_branch]
symbol = "  "
style = "bold zen_purple"
format = "on [$symbol$branch]($style) "

[aws]
symbol = "☁️  "
style = "bold zen_yellow"
format = "on [$symbol($profile)]($style) "

[kubernetes]
symbol = "☸️  "
style = "bold zen_blue"
format = "at [$symbol$context]($style) "

[character]
success_symbol = "❯"
error_symbol = "❌ ❯"
